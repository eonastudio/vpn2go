name: Build VPN2GO APK with sing-box

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-libbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Android NDK
        uses: android-actions/setup-android@v3

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Clone sing-box and build libbox.aar
        run: |
          git clone --depth 1 --branch v1.11.0 https://github.com/sagernet/sing-box.git /tmp/sing-box
          cd /tmp/sing-box
          go get golang.org/x/mobile
          go mod tidy
          mkdir -p "${{ github.workspace }}/flutter_app/android/app/libs"
          gomobile bind \
            -target=android \
            -androidapi=24 \
            -o "${{ github.workspace }}/flutter_app/android/app/libs/libbox.aar" \
            ./experimental/libbox

      - name: Upload libbox.aar
        uses: actions/upload-artifact@v4
        with:
          name: libbox-aar
          path: flutter_app/android/app/libs/libbox.aar

  build-apk:
    needs: build-libbox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Download libbox.aar
        uses: actions/download-artifact@v4
        with:
          name: libbox-aar
          path: flutter_app/android/app/libs/

      - name: Copy singbox bridge code
        run: |
          cp -r singbox-mobile/android/src/main/java/com/vpn2go/singbox \
                flutter_app/android/app/src/main/java/com/vpn2go/

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build APK
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vpn2go-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
